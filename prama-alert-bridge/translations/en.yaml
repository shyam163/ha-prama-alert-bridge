configuration:
  cameras:
    name: Cameras
    description: List of Prama cameras to monitor. Each camera runs its own detection stream independently.
    host:
      name: Camera Host
      description: IP address or hostname of the Prama camera (e.g., 192.168.1.44)
    username:
      name: Camera Username
      description: Username for camera digest authentication (default is admin)
    password:
      name: Camera Password
      description: Password for camera digest authentication
    sensor_name:
      name: Sensor Name
      description: >-
        Unique name for this camera sensor. Used in entity ID and MQTT topics.
        Example prama_front creates binary_sensor.motion_detected_with_occupancy_timeout_prama_front.
        Use lowercase with underscores only. Must be unique per camera.
    detection_types:
      name: Detection Types
      description: Types of AI detection to bridge. Options are human and vehicle.
    off_delay:
      name: Off Delay (seconds)
      description: >-
        Seconds after last detection before the sensor turns off.
        Acts as an occupancy timeout. Range 10 to 600.
  mqtt_host:
    name: MQTT Host
    description: IP address or hostname of the MQTT broker (e.g., your Home Assistant IP)
  mqtt_port:
    name: MQTT Port
    description: MQTT broker port (default 1883)
  mqtt_username:
    name: MQTT Username
    description: Username for MQTT broker authentication
  mqtt_password:
    name: MQTT Password
    description: Password for MQTT broker authentication
  log_level:
    name: Log Level
    description: Logging verbosity. Use debug to see all events including non-human motion.
