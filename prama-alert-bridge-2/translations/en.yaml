configuration:
  camera_host:
    name: Camera Host
    description: IP address or hostname of the Prama camera (e.g., 192.168.1.44)
  camera_username:
    name: Camera Username
    description: Username for camera digest authentication (default is admin)
  camera_password:
    name: Camera Password
    description: Password for camera digest authentication
  mqtt_host:
    name: MQTT Host
    description: IP address or hostname of the MQTT broker (e.g., your Home Assistant IP)
  mqtt_port:
    name: MQTT Port
    description: MQTT broker port (default 1883)
  mqtt_username:
    name: MQTT Username
    description: Username for MQTT broker authentication
  mqtt_password:
    name: MQTT Password
    description: Password for MQTT broker authentication
  detection_types:
    name: Detection Types
    description: >-
      Types of AI detection to bridge. Options are human and vehicle.
      The camera on-device AI classifies motion targets into these categories.
  off_delay:
    name: Off Delay (seconds)
    description: >-
      Seconds after last detection before the sensor turns off.
      Acts as an occupancy timeout. The sensor stays ON as long as detections
      keep arriving within this window. Range 10 to 600.
  sensor_name:
    name: Sensor Name
    description: >-
      Short name for the sensor entity. Used in entity ID and MQTT topics.
      Example prama creates binary_sensor.motion_detected_with_occupancy_timeout_prama.
      Use lowercase with underscores only.
  log_level:
    name: Log Level
    description: Logging verbosity. Use debug to see all events including non-human motion.
